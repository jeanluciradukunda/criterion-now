name: CriterionNow
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  CriterionNow:
    type: application
    platform: macOS
    sources:
      - path: CriterionNow
      - path: CriterionNowWidget/SharedData.swift
    dependencies:
      - target: CriterionNowWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.CriterionNow
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: "Criterion Now"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CriterionNow/Resources/CriterionNow.entitlements
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    info:
      path: CriterionNow/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Criterion Now"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  CriterionNowWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: CriterionNowWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.CriterionNow.widget
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: CriterionNowWidget/Resources/CriterionNowWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    info:
      path: CriterionNowWidget/Resources/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
