name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen || true
          xcodegen generate

      - name: Create dummy Secrets.plist
        run: |
          cp CriterionNow/Resources/Secrets.example.plist CriterionNow/Resources/Secrets.plist

      - name: Build
        run: |
          xcodebuild \
            -scheme CriterionNow \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Verify app exists
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Criterion Now.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "❌ Build artifact not found"
            exit 1
          fi
          echo "✅ Found: $APP"
